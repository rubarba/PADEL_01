    function getAveragePrice(product) {
      const totals = product.offers.map((offer) => offer.price + offer.shipping);
      return totals.reduce((sum, value) => sum + value, 0) / totals.length;
    }

    function getDiscountPercent(product) {
      const best = getBestOffer(product);
      const average = getAveragePrice(product);
      return Math.round(((average - (best.price + best.shipping)) / average) * 100);
    }

    function getBadges(product) {
      const best = getBestOffer(product);
      const discount = getDiscountPercent(product);
      const badges = [];
      if (best && best.stock) badges.push('Melhor preco');
      if (discount >= 20) badges.push('Grande desconto');
      if (discount >= 20) badges.push(`-${discount}%`);
      if (product.bestseller) badges.push('Mais vendida');
      return badges.slice(0, 3);
    }

    function currency(value) {
      return `EUR ${value.toFixed(2)}`;
    }


    const lightLogo = './logo-light-vr8.svg';
    const darkLogo = './logo-dark-vr8.svg';

    const SearchIcon = () => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" className="w-5 h-5">
        <circle cx="11" cy="11" r="7"></circle>
        <path d="M20 20l-3.5-3.5"></path>
      </svg>
    );


    const CategoryIcon = ({ id }) => {
      const common = { viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: '1.8', className: 'category-icon' };
      if (id === 'raquetes') return <svg {...common}><path d="M8 5c2-2 6-2 8 0s2 6 0 8l-4.5 4.5c-1.6 1.6-4.4 1.6-6 0s-1.6-4.4 0-6L10 7"></path><path d="M13 11l6 6"></path><path d="M17 15l2-2"></path></svg>;
      if (id === 'bolas') return <svg {...common}><circle cx="12" cy="12" r="7"></circle><path d="M7.5 7.5c2 1.2 3.2 3 3.6 5.2"></path><path d="M16.5 16.5c-2-1.2-3.2-3-3.6-5.2"></path></svg>;
      if (id === 'sacos') return <svg {...common}><path d="M6 9h12l1 10H5L6 9Z"></path><path d="M9 9V7a3 3 0 0 1 6 0v2"></path></svg>;
      if (id === 'overgrips') return <svg {...common}><path d="M7 17c2.5-5 5.5-8.5 10-11"></path><path d="M9.5 18.5 6 15l3.5-3.5"></path><path d="M18 9l-3-3"></path></svg>;
      if (id === 'sapatilhas') return <svg {...common}><path d="M4 15h16v4H4z"></path><path d="M6 15c2.5 0 3-2 4.5-4l2.5 1 2 3h5"></path></svg>;
      return <svg {...common}><path d="M5 7h14"></path><path d="M5 12h14"></path><path d="M5 17h14"></path></svg>;
    };

    function App() {
      const [page, setPage] = useState('home');
      const [selectedCategory, setSelectedCategory] = useState('raquetes');
      const [selectedProduct, setSelectedProduct] = useState(null);
      const [compareIds, setCompareIds] = useState([]);
      const [searchQuery, setSearchQuery] = useState('');
      const [showAutocomplete, setShowAutocomplete] = useState(false);
      const [filters, setFilters] = useState({
        brand: 'todas',
        forma: 'todas',
        peso: 'todos',
        nivel: 'todos',
        estilo: 'todos',
        precoMax: 300,
        quick: 'todos',
      });

      const brands = useMemo(() => ['todas', ...new Set(PRODUCTS_DB.filter(p => p.category === 'raquetes').map(p => p.brand))], []);
      const formas = useMemo(() => ['todas', ...new Set(PRODUCTS_DB.filter(p => p.category === 'raquetes').map(p => p.specs.forma))], []);
      const pesos = ['todos', '<=360g', '361-365g', '>365g'];
      const niveis = ['todos', 'Iniciante', 'Intermedio', 'Avancado'];
      const estilos = ['todos', 'Potencia', 'Controlo'];
      const shoeBrands = useMemo(() => ['todas', ...new Set(PRODUCTS_DB.filter(p => p.category === 'sapatilhas').map(p => p.brand))], []);
      const shoePerfis = useMemo(() => ['todos', ...new Set(PRODUCTS_DB.filter(p => p.category === 'sapatilhas').map(p => p.specs.equilibrio))], []);
      const shoeEstilos = useMemo(() => ['todos', ...new Set(PRODUCTS_DB.filter(p => p.category === 'sapatilhas').map(p => p.specs.estilo))], []);
      const shoePesos = ['todos', '<=325g', '326-340g', '>340g'];

      const autocompleteItems = useMemo(() => {
        const query = searchQuery.trim().toLowerCase();
        if (!query) return [];

        const productSuggestions = PRODUCTS_DB
          .filter(product => product.name.toLowerCase().includes(query) || product.brand.toLowerCase().includes(query))
          .slice(0, 5)
          .map(product => ({ type: 'product', item: product }));

        const categorySuggestions = CATEGORIES
          .filter(category => category.name.toLowerCase().includes(query) || category.id.toLowerCase().includes(query))
          .slice(0, 3)
          .map(category => ({ type: 'category', item: category }));

        return [...productSuggestions, ...categorySuggestions].slice(0, 6);
      }, [searchQuery]);

      const filteredCategoryProducts = useMemo(() => {
        const query = searchQuery.trim().toLowerCase();
        return PRODUCTS_DB.filter(product => {
          const bestOffer = getBestOffer(product);
          const totalPrice = bestOffer.price + bestOffer.shipping;
          const matchesCategory = (() => {
            if (selectedCategory === 'todos') return true;
            if (selectedCategory === 'equipamento') return product.category === 'overgrips';
            if (selectedCategory === 'oportunidades') return getDiscountPercent(product) >= 15;
            return product.category === selectedCategory;
          })();
          const matchesSearch = !query || `${product.name} ${product.brand} ${product.category}`.toLowerCase().includes(query);
          const matchesBrand = filters.brand === 'todas' || product.brand === filters.brand;
          const matchesForma = selectedCategory === 'sapatilhas'
            ? filters.forma === 'todos' || filters.forma === 'todas' || product.specs.equilibrio === filters.forma
            : filters.forma === 'todas' || product.specs.forma === filters.forma;
          const matchesNivel = filters.nivel === 'todos' || product.specs.nivel === filters.nivel;
          const matchesEstilo = filters.estilo === 'todos' || product.specs.estilo === filters.estilo;
          const matchesPreco = totalPrice <= filters.precoMax;
          const matchesQuick = selectedCategory === 'raquetes'
            ? filters.quick === 'todos' || product.tags.includes(filters.quick)
            : true;

          let matchesPeso = true;
          const numericWeight = Number((product.specs.peso || '').replace('g', ''));
          if (selectedCategory === 'raquetes' && !Number.isNaN(numericWeight)) {
            if (filters.peso === '<=360g') matchesPeso = numericWeight <= 360;
            if (filters.peso === '361-365g') matchesPeso = numericWeight >= 361 && numericWeight <= 365;
            if (filters.peso === '>365g') matchesPeso = numericWeight > 365;
          }

          if (selectedCategory === 'sapatilhas' && !Number.isNaN(numericWeight)) {
            if (filters.peso === '<=325g') matchesPeso = numericWeight <= 325;
            if (filters.peso === '326-340g') matchesPeso = numericWeight >= 326 && numericWeight <= 340;
            if (filters.peso === '>340g') matchesPeso = numericWeight > 340;
          }

          return matchesCategory && matchesSearch && matchesBrand && matchesForma && matchesNivel && matchesEstilo && matchesPreco && matchesQuick && matchesPeso;
        });
      }, [searchQuery, selectedCategory, filters]);

      const discoverySections = useMemo(() => {
        return [
          {
            title: 'Mais vendidas',
            products: PRODUCTS_DB.filter(product => product.bestseller),
          },
          {
            title: 'Escolhas dos jogadores',
            products: PRODUCTS_DB.filter(product => product.playerPick),
          },
          {
            title: 'Boas para iniciantes',
            products: PRODUCTS_DB.filter(product => product.tags.includes('iniciante')),
          },
          {
            title: 'Raquetes de potencia',
            products: PRODUCTS_DB.filter(product => product.category === 'raquetes' && product.specs.estilo === 'Potencia'),
          },
          {
            title: 'Raquetes de controlo',
            products: PRODUCTS_DB.filter(product => product.category === 'raquetes' && product.specs.estilo === 'Controlo'),
          },
        ].map(section => ({ ...section, products: section.products.slice(0, 10) }));
      }, []);

      const compareProducts = useMemo(() => PRODUCTS_DB.filter(product => compareIds.includes(product.id)).slice(0, 3), [compareIds]);

      const openCategory = (categoryId) => {
        const normalizedCategory = categoryId === 'overgrips' ? 'equipamento' : categoryId;
        setSelectedCategory(normalizedCategory);
        setFilters({
          brand: 'todas',
          forma: normalizedCategory === 'sapatilhas' ? 'todos' : 'todas',
          peso: 'todos',
          nivel: 'todos',
          estilo: 'todos',
          precoMax: normalizedCategory === 'sapatilhas' ? 180 : 300,
          quick: 'todos',
        });
        setPage('category');
      };

      const openProduct = (product) => {
        setSelectedProduct(product);
        setPage('product');
      };

      const toggleCompare = (productId) => {
        setCompareIds((current) => {
          if (current.includes(productId)) return current.filter(id => id !== productId);
          if (current.length >= 3) return [...current.slice(1), productId];
          return [...current, productId];
        });
      };

      const handleAutocompleteSelect = (entry) => {
        if (entry.type === 'product') {
          setSearchQuery(entry.item.name);
          setShowAutocomplete(false);
          openProduct(entry.item);
          return;
        }
        setSearchQuery(entry.item.name);
        setShowAutocomplete(false);
        openCategory(entry.item.id);
      };


      const performSearch = () => {
        const query = searchQuery.trim().toLowerCase();
        setShowAutocomplete(false);
        if (!query) {
          openCategory('todos');
          return;
        }

        const exactProduct = PRODUCTS_DB.find((product) => product.name.toLowerCase() === query);
        if (exactProduct) {
          openProduct(exactProduct);
          return;
        }

        const partialProducts = PRODUCTS_DB.filter((product) =>
          `${product.name} ${product.brand} ${product.category}`.toLowerCase().includes(query)
        );
        if (partialProducts.length === 1) {
          openProduct(partialProducts[0]);
          return;
        }

        const matchingCategory = CATEGORIES.find((category) =>
          category.name.toLowerCase().includes(query) ||
          category.id.toLowerCase().includes(query) ||
          query.includes(category.name.toLowerCase().slice(0, Math.min(4, category.name.length)))
        );
        if (matchingCategory) {
          openCategory(matchingCategory.id);
          return;
        }

        const matchingBrand = PRODUCTS_DB.find((product) => product.brand.toLowerCase() === query);

        setSelectedCategory('todos');
        setFilters({
          brand: matchingBrand ? matchingBrand.brand : 'todas',
          forma: 'todas',
          peso: 'todos',
          nivel: 'todos',
          estilo: 'todos',
          precoMax: 300,
          quick: 'todos',
        });
        setPage('category');
      };

      const ProductBadges = ({ product }) => {
        const badges = getBadges(product);
        if (!badges.length) return null;
        return (
          <div className="flex flex-wrap gap-2 mt-3">
            {badges.map((badge) => (
              <span key={badge} className="text-[11px] font-bold rounded-full px-2.5 py-1" style={{ backgroundColor: 'var(--accent-soft)', color: 'var(--text)' }}>
                {badge}
              </span>
            ))}
          </div>
        );
      };

      const ProductCard = ({ product, compact = false }) => {
        const bestOffer = getBestOffer(product);
        const inCompare = compareIds.includes(product.id);
        return (
          <div className="product-card surface rounded-[30px] overflow-hidden min-w-0" style={{ boxShadow: '0 18px 38px rgba(15,28,42,0.07)' }}>
            <div className={`${compact ? 'p-5' : 'p-6'}`}>
              <div className="rounded-[24px] p-4 flex items-center justify-center mb-5" style={{ backgroundColor: 'var(--bg-alt)' }}>
                <img src={product.image} alt={product.name} className={`${compact ? 'h-28' : 'h-40'} w-full object-contain`} />
              </div>
              <div className="flex items-center justify-between gap-3 mb-3">
                <span className="text-xs font-bold uppercase tracking-wide" style={{ color: '#1272b6' }}>{product.brand}</span>
                <span className="text-xs px-2.5 py-1 rounded-full" style={{ backgroundColor: 'rgba(23,146,232,0.10)', color: '#1272b6', border: '1px solid rgba(23,146,232,0.12)' }}>{product.offers.length} lojas</span>
              </div>
              <div className={`font-bold ${compact ? 'text-sm' : 'text-base'} line-clamp-2 min-h-[42px]`} style={{ color: 'var(--text)' }}>{product.name}</div>
              <ProductBadges product={product} />
              <div className="mt-5 flex items-end justify-between gap-4">
                <div>
                  <div className="text-xs text-soft mb-1 uppercase tracking-wide">Desde</div>
                  <div className="brand-font text-3xl font-bold price-text">{currency(bestOffer.price + bestOffer.shipping)}</div>
                </div>
                <button onClick={() => openProduct(product)} className="accent-bg rounded-[18px] px-4 py-3 font-bold text-sm">
                  Ver precos
                </button>
              </div>
              <button
                onClick={() => toggleCompare(product.id)}
                className="mt-3 w-full rounded-[18px] px-4 py-3 text-sm font-bold"
                style={{ backgroundColor: inCompare ? 'rgba(23,146,232,0.10)' : '#f2f5f8', border: '1px solid rgba(20,32,45,0.10)', color: '#14202d' }}
              >
                {inCompare ? 'Remover da comparacao' : 'Comparar'}
              </button>
            </div>
          </div>
        );
      };

      const DiscoverySection = ({ title, products }) => {
        if (!products.length) return null;
        return (
          <section className="mb-8">
            <div className="flex items-center justify-between mb-4 gap-4">
              <h2 className="brand-font text-2xl md:text-3xl font-bold">{title}</h2>
              <button onClick={() => openCategory('todos')} className="text-sm font-bold accent-text">Ver mais</button>
            </div>
            <div className="carousel-scroll flex gap-4 overflow-x-auto pb-2">
              {products.map((product) => (
                <div key={product.id} className="min-w-[250px] md:min-w-[280px] max-w-[280px] shrink-0">
                  <ProductCard product={product} compact />
                </div>
              ))}
            </div>
          </section>
        );
      };

      const Header = () => (
        <div className="sticky top-0 z-50 backdrop-blur-xl" style={{ backgroundColor: 'rgba(0,0,0,0)' }}>
          <header className="w-full pt-0 pb-0">
            <div className="header-shell px-3 md:px-5 xl:px-6 pt-4 md:pt-5 pb-4 md:pb-5">
              <div className="max-w-7xl mx-auto relative z-[1]">
                <form onSubmit={(e) => { e.preventDefault(); performSearch(); }} className="grid grid-cols-1 lg:grid-cols-[auto_minmax(0,0.64fr)_auto] gap-4 lg:gap-5 items-start">
                  <div className="pl-2 md:pl-4 pr-4 md:pr-9 py-1">
                    <button type="button" onClick={() => setPage('home')} className="text-left flex items-center">
                      <img src={darkLogo} alt="PadelCost" className="h-[37px] md:h-[46px] w-auto object-contain" />
                    </button>
                    <div className="mt-4 text-sm font-semibold" style={{ color: '#ffffff' }}>
                      Descobre produtos. Compara precos.
                    </div>
                  </div>
                  <input
                    value={searchQuery}
                    onFocus={() => setShowAutocomplete(true)}
                    onChange={(e) => { setSearchQuery(e.target.value); setShowAutocomplete(true); }}
                    placeholder="Procurar produto, marca ou categoria"
                    className="w-full rounded-full px-6 py-4 text-sm md:text-base focus:outline-none self-start"
                    style={{ backgroundColor: 'rgba(248,251,255,0.98)', border: '1px solid rgba(255,255,255,0.18)', color: '#13202c', boxShadow: 'inset 0 1px 0 rgba(255,255,255,0.5)' }}
                  />
                  <button type="submit" className="accent-bg rounded-full px-4 py-4 font-bold inline-flex items-center justify-center gap-2 whitespace-nowrap self-start">
                    <SearchIcon />
                    <span className="hidden md:inline">Pesquisar</span>
                  </button>
                </form>
                {showAutocomplete && autocompleteItems.length > 0 && (
                  <div className="absolute left-0 right-0 mt-3 rounded-3xl p-3 z-50" style={{ backgroundColor: '#fdfefe', border: '1px solid rgba(19,32,44,0.08)', boxShadow: '0 20px 48px rgba(15,23,42,0.14)' }}>
                    <div className="space-y-2">
                      {autocompleteItems.map((entry, index) => {
                        if (entry.type === 'product') {
                          const bestOffer = getBestOffer(entry.item);
                          return (
                            <button key={`${entry.type}-${entry.item.id}-${index}`} onClick={() => handleAutocompleteSelect(entry)} className="w-full text-left rounded-2xl px-4 py-3 hover:bg-black/5" style={{ backgroundColor: 'transparent', color: '#13202c' }}>
                              <div className="flex items-center gap-3">
                                <img src={entry.item.image} alt={entry.item.name} className="w-12 h-12 rounded-xl object-cover" />
                                <div className="min-w-0 flex-1">
                                  <div className="font-bold line-clamp-1">{entry.item.name}</div>
                                  <div className="text-sm text-soft">Desde {currency(bestOffer.price + bestOffer.shipping)}</div>
                                </div>
                              </div>
                            </button>
                          );
                        }
                        return (
                          <button key={`${entry.type}-${entry.item.id}-${index}`} onClick={() => handleAutocompleteSelect(entry)} className="w-full text-left rounded-2xl px-4 py-3 hover:bg-black/5" style={{ backgroundColor: 'transparent', color: '#13202c' }}>
                            <div className="font-bold">Categoria: {entry.item.name}</div>
                            <div className="text-sm text-soft">Abrir categoria</div>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            </div>
          </header>

          <div className="w-full pb-3" style={{ backgroundColor: '#ffffff', borderBottom: '1px solid rgba(20,32,45,0.06)' }}>
            <div className="max-w-7xl mx-auto px-3 md:px-5 xl:px-6">
              <div className="flex gap-6 overflow-x-auto carousel-scroll py-3 items-center">
                {CATEGORIES.map((category) => (
                  <button
                    key={category.id}
                    onClick={() => openCategory(category.id)}
                    className="category-tab whitespace-nowrap text-sm font-bold inline-flex items-center gap-3 pb-2"
                    style={{
                      backgroundColor: 'transparent',
                      border: 'none',
                      borderBottom: selectedCategory === category.id ? '2px solid var(--accent)' : '2px solid transparent',
                      color: selectedCategory === category.id ? 'var(--text)' : 'rgba(19,32,44,0.76)',
                    }}
                  >
                    <img src={category.image} alt={category.name} className="w-11 h-11 rounded-2xl object-cover shrink-0" />
                    <span>{category.name}</span>
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>
      );

      const FiltersPanel = () => (
        <div className="surface rounded-[28px] p-5 md:p-6 mb-6" style={{ boxShadow: '0 18px 40px rgba(14,24,36,0.06)' }}>
          <div className="flex flex-col gap-5">
            <div>
              <div className="font-bold mb-3">Filtros rapidos</div>
              <div className="flex flex-wrap gap-2">
                <button
                  onClick={() => setFilters((prev) => ({ ...prev, quick: 'todos' }))}
                  className="icon-chip rounded-full px-3 py-2 text-sm font-bold"
                  style={{ backgroundColor: filters.quick === 'todos' ? 'var(--accent-soft)' : 'var(--surface-2)', border: '1px solid var(--border)', color: 'var(--text)' }}
                >
                  Tudo
                </button>
                {QUICK_FILTERS.map((filter) => (
                  <button
                    key={filter.id}
                    onClick={() => setFilters((prev) => ({ ...prev, quick: prev.quick === filter.id ? 'todos' : filter.id }))}
                    className="icon-chip rounded-full px-3 py-2 text-sm font-bold"
                    style={{ backgroundColor: filters.quick === filter.id ? 'var(--accent-soft)' : 'var(--surface-2)', border: '1px solid var(--border)', color: 'var(--text)' }}
                  >
                    {filter.label}
                  </button>
                ))}
              </div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
              <div>
                <label className="text-sm font-bold mb-2 block">Marca</label>
                <select value={filters.brand} onChange={(e) => setFilters((prev) => ({ ...prev, brand: e.target.value }))} className="w-full rounded-2xl px-4 py-3" style={{ backgroundColor: 'var(--surface-2)', border: '1px solid var(--border)', color: 'var(--text)' }}>
                  {brands.map((item) => <option key={item} value={item}>{item === 'todas' ? 'Todas' : item}</option>)}
                </select>
              </div>
              <div>
                <label className="text-sm font-bold mb-2 block">Forma</label>
                <select value={filters.forma} onChange={(e) => setFilters((prev) => ({ ...prev, forma: e.target.value }))} className="w-full rounded-2xl px-4 py-3" style={{ backgroundColor: 'var(--surface-2)', border: '1px solid var(--border)', color: 'var(--text)' }}>
                  {formas.map((item) => <option key={item} value={item}>{item === 'todas' ? 'Todas' : item}</option>)}
                </select>
              </div>
              <div>
                <label className="text-sm font-bold mb-2 block">Peso</label>
                <select value={filters.peso} onChange={(e) => setFilters((prev) => ({ ...prev, peso: e.target.value }))} className="w-full rounded-2xl px-4 py-3" style={{ backgroundColor: 'var(--surface-2)', border: '1px solid var(--border)', color: 'var(--text)' }}>
                  {pesos.map((item) => <option key={item} value={item}>{item}</option>)}
                </select>
              </div>
              <div>
                <label className="text-sm font-bold mb-2 block">Nivel jogador</label>
                <select value={filters.nivel} onChange={(e) => setFilters((prev) => ({ ...prev, nivel: e.target.value }))} className="w-full rounded-2xl px-4 py-3" style={{ backgroundColor: 'var(--surface-2)', border: '1px solid var(--border)', color: 'var(--text)' }}>
                  {niveis.map((item) => <option key={item} value={item}>{item}</option>)}
                </select>
              </div>
              <div>
                <label className="text-sm font-bold mb-2 block">Estilo</label>
                <select value={filters.estilo} onChange={(e) => setFilters((prev) => ({ ...prev, estilo: e.target.value }))} className="w-full rounded-2xl px-4 py-3" style={{ backgroundColor: 'var(--surface-2)', border: '1px solid var(--border)', color: 'var(--text)' }}>
                  {estilos.map((item) => <option key={item} value={item}>{item}</option>)}
                </select>
              </div>
              <div>
                <label className="text-sm font-bold mb-2 block">Preco maximo: {currency(filters.precoMax)}</label>
                <input type="range" min="50" max="300" step="10" value={filters.precoMax} onChange={(e) => setFilters((prev) => ({ ...prev, precoMax: Number(e.target.value) }))} className="w-full" />
              </div>
            </div>
          </div>
        </div>
      );


      const ShoesFiltersPanel = () => (
        <div className="surface rounded-[28px] p-5 md:p-6 mb-6" style={{ boxShadow: '0 18px 40px rgba(14,24,36,0.06)' }}>
          <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">
            <div>
              <label className="text-sm font-bold mb-2 block">Marca</label>
              <select value={filters.brand} onChange={(e) => setFilters((prev) => ({ ...prev, brand: e.target.value }))} className="w-full rounded-2xl px-4 py-3" style={{ backgroundColor: 'var(--surface-2)', border: '1px solid var(--border)', color: 'var(--text)' }}>
                {shoeBrands.map((item) => <option key={item} value={item}>{item === 'todas' ? 'Todas' : item}</option>)}
              </select>
            </div>
            <div>
              <label className="text-sm font-bold mb-2 block">Perfil</label>
              <select value={filters.forma} onChange={(e) => setFilters((prev) => ({ ...prev, forma: e.target.value }))} className="w-full rounded-2xl px-4 py-3" style={{ backgroundColor: 'var(--surface-2)', border: '1px solid var(--border)', color: 'var(--text)' }}>
                {shoePerfis.map((item) => <option key={item} value={item}>{item === 'todos' ? 'Todos' : item}</option>)}
              </select>
            </div>
            <div>
              <label className="text-sm font-bold mb-2 block">Peso</label>
              <select value={filters.peso} onChange={(e) => setFilters((prev) => ({ ...prev, peso: e.target.value }))} className="w-full rounded-2xl px-4 py-3" style={{ backgroundColor: 'var(--surface-2)', border: '1px solid var(--border)', color: 'var(--text)' }}>
                {shoePesos.map((item) => <option key={item} value={item}>{item}</option>)}
              </select>
            </div>
            <div>
              <label className="text-sm font-bold mb-2 block">Nivel</label>
              <select value={filters.nivel} onChange={(e) => setFilters((prev) => ({ ...prev, nivel: e.target.value }))} className="w-full rounded-2xl px-4 py-3" style={{ backgroundColor: 'var(--surface-2)', border: '1px solid var(--border)', color: 'var(--text)' }}>
                {niveis.map((item) => <option key={item} value={item}>{item}</option>)}
              </select>
            </div>
            <div>
              <label className="text-sm font-bold mb-2 block">Estilo</label>
              <select value={filters.estilo} onChange={(e) => setFilters((prev) => ({ ...prev, estilo: e.target.value }))} className="w-full rounded-2xl px-4 py-3" style={{ backgroundColor: 'var(--surface-2)', border: '1px solid var(--border)', color: 'var(--text)' }}>
                {shoeEstilos.map((item) => <option key={item} value={item}>{item === 'todos' ? 'Todos' : item}</option>)}
              </select>
            </div>
            <div className="md:col-span-2 xl:col-span-3">
              <label className="text-sm font-bold mb-2 block">Preco maximo: {currency(filters.precoMax)}</label>
              <input type="range" min="60" max="180" step="5" value={filters.precoMax} onChange={(e) => setFilters((prev) => ({ ...prev, precoMax: Number(e.target.value) }))} className="w-full" />
            </div>
          </div>
        </div>
      );

      const ComparisonBar = () => {
        if (!compareProducts.length) return null;
        return (
          <div className="fixed bottom-4 left-1/2 -translate-x-1/2 w-[calc(100%-24px)] md:w-auto z-50">
            <div className="surface rounded-3xl px-4 md:px-5 py-4 flex flex-col md:flex-row md:items-center gap-4">
              <div className="flex flex-wrap gap-2 md:max-w-[560px]">
                {compareProducts.map((product) => (
                  <div key={product.id} className="rounded-2xl px-3 py-2 text-sm font-bold" style={{ backgroundColor: 'var(--accent-soft)', color: 'var(--text)' }}>
                    {product.name}
                  </div>
                ))}
              </div>
              <div className="flex gap-3">
                <button onClick={() => setPage('compare')} className="accent-bg rounded-[18px] px-5 py-3 font-bold text-sm whitespace-nowrap">
                  Comparar agora
                </button>
                <button onClick={() => setCompareIds([])} className="rounded-2xl px-4 py-3 text-sm font-bold" style={{ backgroundColor: 'var(--surface-2)', border: '1px solid var(--border)', color: 'var(--text)' }}>
                  Limpar
                </button>
              </div>
            </div>
          </div>
        );
      };

      const ProductPage = ({ product }) => {
        const orderedOffers = [...product.offers].sort((a, b) => (a.price + a.shipping) - (b.price + b.shipping));
        const bestOffer = orderedOffers[0];
        const similarProducts = PRODUCTS_DB
          .filter((item) => item.id !== product.id && (item.brand === product.brand || item.category === product.category))
          .slice(0, 4);
        return (
          <div className="max-w-7xl mx-auto px-4 md:px-6 pb-28">
            <div className="text-sm text-soft mb-6">
              <button onClick={() => setPage('home')} className="hover:underline">Inicio</button>
              {' / '}
              <button onClick={() => openCategory(product.category)} className="hover:underline">{product.category}</button>
              {' / '}
              <span style={{ color: 'var(--text)' }}>{product.name}</span>
            </div>

            <div className="grid lg:grid-cols-[0.92fr_1.08fr] gap-6 mb-6">
              <div className="surface rounded-[30px] p-8 flex items-center justify-center" style={{ boxShadow: '0 20px 40px rgba(15,28,42,0.07)' }}>
                <img src={product.image} alt={product.name} className="w-full max-h-[460px] object-contain" />
              </div>
              <div className="surface rounded-[30px] p-8" style={{ boxShadow: '0 20px 40px rgba(15,28,42,0.07)' }}>
                <div className="flex flex-wrap items-center gap-3 mb-4">
                  <div className="text-sm font-bold uppercase tracking-wide" style={{ color: '#1272b6' }}>{product.brand}</div>
                  <div className="text-xs px-2.5 py-1 rounded-full" style={{ backgroundColor: 'rgba(23,146,232,0.10)', color: '#1272b6', border: '1px solid rgba(23,146,232,0.12)' }}>{orderedOffers.length} lojas</div>
                </div>
                <h1 className="brand-font text-3xl md:text-5xl font-bold mb-4">{product.name}</h1>
                <ProductBadges product={product} />

                <div className="mt-6 rounded-[28px] p-6" style={{ background: 'linear-gradient(180deg, rgba(23,146,232,0.08) 0%, rgba(255,255,255,0.96) 100%)', border: '1px solid rgba(23,146,232,0.12)' }}>
                  <div className="text-sm text-soft mb-2">Melhor preco total</div>
                  <div className="brand-font text-5xl font-bold price-text mb-2">{currency(bestOffer.price + bestOffer.shipping)}</div>
                  <div className="text-sm text-soft">{bestOffer.store} · entrega {bestOffer.eta}</div>
                  <a href={bestOffer.url} target="_blank" rel="noopener noreferrer" className="inline-flex accent-bg rounded-[18px] px-5 py-3 font-bold mt-4">Ver oferta</a>
                </div>

                <div className="grid grid-cols-2 md:grid-cols-3 gap-3 mt-6">
                  {Object.entries(product.specs).map(([label, value]) => (
                    <div key={label} className="surface-plain rounded-[22px] p-4">
                      <div className="text-[11px] uppercase tracking-wide text-muted mb-1">{label}</div>
                      <div className="font-bold text-sm">{value}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            <div className="surface rounded-[30px] overflow-hidden mb-8" style={{ boxShadow: '0 20px 40px rgba(15,28,42,0.07)' }}>
              <div className="px-6 md:px-8 py-6 border-b flex flex-col md:flex-row md:items-end md:justify-between gap-3" style={{ borderColor: 'var(--border)' }}>
                <div>
                  <h2 className="brand-font text-2xl md:text-3xl font-bold">Precos em {orderedOffers.length} lojas</h2>
                  <div className="text-sm text-soft mt-1">Ordenado pelo valor total mais baixo.</div>
                </div>
                <div className="text-sm text-soft">Melhor preco: <span style={{ color: '#1272b6', fontWeight: '700' }}>{currency(bestOffer.price + bestOffer.shipping)}</span></div>
              </div>
              <div className="p-4 md:p-6 space-y-3">
                <div className="hidden md:grid md:grid-cols-[1.2fr_0.9fr_0.7fr_auto] gap-4 px-5 pb-2 text-[11px] uppercase tracking-[0.16em]" style={{ color: 'var(--text-muted)' }}>
                  <div>Loja</div>
                  <div>Total</div>
                  <div>Entrega</div>
                  <div>Oferta</div>
                </div>
                {orderedOffers.map((offer, index) => (
                  <div key={`${offer.store}-${index}`} className={`store-row rounded-[24px] p-5 md:p-6 grid md:grid-cols-[1.2fr_0.9fr_0.7fr_auto] gap-4 items-center ${index === 0 ? 'store-best' : 'surface-plain'}`} style={index === 0 ? {} : { border: '1px solid var(--border)' }}>
                    <div className="flex items-center gap-4 min-w-0">
                      <div className="rounded-2xl px-3 py-2 text-xs font-bold shrink-0" style={{ backgroundColor: index === 0 ? 'rgba(23,146,232,0.12)' : 'var(--bg-alt)', color: index === 0 ? '#1272b6' : 'var(--text)' }}>
                        {index === 0 ? 'Melhor' : `#${index + 1}`}
                      </div>
                      <div className="min-w-0">
                        <div className="font-bold text-base">{offer.store}</div>
                        <div className="text-sm text-soft">{offer.stock ? 'Em stock' : 'Sem stock'}</div>
                      </div>
                    </div>
                    <div>
                      <div className="brand-font text-3xl font-bold price-text">{currency(offer.price + offer.shipping)}</div>
                      <div className="text-sm text-soft">Produto {currency(offer.price)} · portes {currency(offer.shipping)}</div>
                    </div>
                    <div className="text-sm" style={{ color: 'var(--text)' }}>{offer.eta}</div>
                    <a href={offer.url} target="_blank" rel="noopener noreferrer" className="accent-bg rounded-[18px] px-5 py-3 font-bold whitespace-nowrap text-center">
                      Ver oferta
                    </a>
                  </div>
                ))}
              </div>
            </div>

            {similarProducts.length > 0 && (
              <section>
                <div className="flex items-center justify-between gap-4 mb-4">
                  <h2 className="brand-font text-2xl md:text-3xl font-bold">Produtos semelhantes</h2>
                  <button onClick={() => openCategory(product.category)} className="accent-text font-bold">Ver mais</button>
                </div>
                <div className="carousel-scroll flex gap-4 overflow-x-auto pb-2">
                  {similarProducts.map((item) => (
                    <div key={item.id} className="min-w-[250px] md:min-w-[280px] max-w-[280px] shrink-0">
                      <ProductCard product={item} compact />
                    </div>
                  ))}
                </div>
              </section>
            )}
          </div>
        );
      };

      const ComparePage = () => {
        if (!compareProducts.length) {
          return (
            <div className="max-w-6xl mx-auto px-4 md:px-6 pb-24">
              <div className="surface rounded-[28px] p-12 text-center">
                <h1 className="brand-font text-3xl font-bold mb-3">Sem produtos para comparar</h1>
                <p className="text-soft">Adiciona ate 3 produtos e volta aqui.</p>
              </div>
            </div>
          );
        }

        const fields = [
          { key: 'brand', label: 'Marca', read: (product) => product.brand },
          { key: 'peso', label: 'Peso', read: (product) => product.specs.peso },
          { key: 'forma', label: 'Forma', read: (product) => product.specs.forma },
          { key: 'equilibrio', label: 'Equilibrio', read: (product) => product.specs.equilibrio },
          { key: 'nivel', label: 'Nivel jogador', read: (product) => product.specs.nivel },
          { key: 'material', label: 'Material', read: (product) => product.specs.material },
          { key: 'preco', label: 'Preco mais baixo', read: (product) => currency(getBestOffer(product).price + getBestOffer(product).shipping) },
        ];

        return (
          <div className="max-w-7xl mx-auto px-4 md:px-6 pb-28">
            <div className="flex items-end justify-between gap-4 mb-6">
              <div>
                <h1 className="brand-font text-4xl md:text-5xl font-bold">Comparacao lado a lado</h1>
                <p className="text-soft mt-2">Compara rapidamente ate 3 produtos.</p>
              </div>
              <button onClick={() => setPage('category')} className="accent-text font-bold">Voltar aos produtos</button>
            </div>
            <div className="surface rounded-[28px] overflow-hidden">
              <div className="overflow-x-auto">
                <table className="min-w-full text-left">
                  <thead>
                    <tr>
                      <th className="p-5 md:p-6 border-b" style={{ borderColor: 'var(--border)' }}>Campo</th>
                      {compareProducts.map((product) => (
                        <th key={product.id} className="p-5 md:p-6 border-b min-w-[240px] align-top" style={{ borderColor: 'var(--border)' }}>
                          <div className="font-bold text-base mb-2">{product.name}</div>
                          <div className="text-sm text-soft">{product.brand}</div>
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {fields.map((field) => (
                      <tr key={field.key}>
                        <td className="p-5 md:p-6 border-b font-bold" style={{ borderColor: 'var(--border)' }}>{field.label}</td>
                        {compareProducts.map((product) => (
                          <td key={`${product.id}-${field.key}`} className="p-5 md:p-6 border-b" style={{ borderColor: 'var(--border)' }}>
                            {field.read(product)}
                          </td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        );
      };

      const CategoryPage = () => (
        <div className="max-w-7xl mx-auto px-4 md:px-6 pb-28">
          <div className="flex flex-col md:flex-row md:items-end md:justify-between gap-4 mb-6">
            <div>
              <h1 className="brand-font text-4xl md:text-5xl font-bold">{selectedCategory === 'todos' ? 'Todos os produtos' : CATEGORIES.find(c => c.id === selectedCategory)?.name}</h1>
              <p className="text-soft mt-2">Resultados atualizados em tempo real com os filtros visuais.</p>
            </div>
            <div className="text-sm font-bold text-soft">{filteredCategoryProducts.length} resultados</div>
          </div>

          {selectedCategory === 'raquetes' && <FiltersPanel />}
          {selectedCategory === 'sapatilhas' && <ShoesFiltersPanel />}

          {filteredCategoryProducts.length === 0 ? (
            <div className="surface rounded-[28px] p-12 text-center">
              <h2 className="brand-font text-2xl font-bold mb-3">Sem resultados</h2>
              <p className="text-soft">Ajusta os filtros para veres mais produtos.</p>
            </div>
          ) : (
            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
              {filteredCategoryProducts.map((product) => <ProductCard key={product.id} product={product} />)}
            </div>
          )}
        </div>
      );


      const Footer = () => (
        <footer className="mt-12">
          <div style={{ backgroundColor: '#f4f5f7', borderTop: '1px solid rgba(20,32,45,0.06)' }}>
            <div className="max-w-7xl mx-auto px-4 md:px-6 py-12 md:py-14 grid md:grid-cols-5 gap-8">
              <div>
                <div className="text-sm font-bold uppercase tracking-[0.18em] mb-5">Padel</div>
                <div className="space-y-3 text-sm text-soft">
                  <button onClick={() => openCategory('raquetes')} className="block text-left">Raquetes</button>
                  <button onClick={() => openCategory('bolas')} className="block text-left">Bolas</button>
                  <button onClick={() => openCategory('sacos')} className="block text-left">Sacos</button>
                  <button onClick={() => openCategory('overgrips')} className="block text-left">Overgrips</button>
                  <button onClick={() => openCategory('sapatilhas')} className="block text-left">Sapatilhas</button>
                </div>
              </div>
              <div>
                <div className="text-sm font-bold uppercase tracking-[0.18em] mb-5">Explorar</div>
                <div className="space-y-3 text-sm text-soft">
                  <div>Mais vendidas</div>
                  <div>Escolhas dos jogadores</div>
                  <div>Novidades</div>
                  <div>Promocoes</div>
                  <div>Comparacoes</div>
                </div>
              </div>
              <div>
                <div className="text-sm font-bold uppercase tracking-[0.18em] mb-5">Marcas</div>
                <div className="space-y-3 text-sm text-soft">
                  <div>Nox</div>
                  <div>Bullpadel</div>
                  <div>Head</div>
                  <div>Babolat</div>
                  <div>Adidas</div>
                </div>
              </div>
              <div>
                <div className="text-sm font-bold uppercase tracking-[0.18em] mb-5">Ajuda</div>
                <div className="space-y-3 text-sm text-soft">
                  <div>Como funciona</div>
                  <div>Lojas</div>
                  <div>Contacto</div>
                  <div>Privacidade</div>
                  <div>Termos</div>
                </div>
              </div>
              <div>
                <img src={darkLogo} alt="PadelCost" className="h-8 w-auto object-contain mb-5" />
                <p className="text-sm text-soft mb-5">Compara precos de padel em varias lojas e encontra a melhor oferta sem ruido.</p>
                <div className="text-sm font-bold uppercase tracking-[0.18em] mb-3">Newsletter</div>
                <div className="flex rounded-[18px] overflow-hidden" style={{ border: '1px solid rgba(20,32,45,0.10)', backgroundColor: '#ffffff' }}>
                  <input placeholder="O teu email" className="flex-1 px-4 py-3 text-sm focus:outline-none" style={{ color: '#14202d' }} />
                  <button className="accent-bg px-4 py-3 text-sm font-bold">Entrar</button>
                </div>
              </div>
            </div>
          </div>

          <div style={{ backgroundColor: '#050c14' }}>
            <div className="max-w-7xl mx-auto px-4 md:px-6 py-10">
              <div className="grid md:grid-cols-[1.1fr_0.9fr_0.8fr] gap-8 items-start">
                <div>
                  <div className="text-sm font-bold uppercase tracking-[0.2em] mb-5" style={{ color: '#ffffff' }}>PadelCost</div>
                  <div className="grid sm:grid-cols-2 gap-6 text-sm" style={{ color: 'rgba(255,255,255,0.72)' }}>
                    <div className="space-y-3">
                      <div>Company info</div>
                      <div>Carreiras</div>
                      <div>Affiliates</div>
                      <div>Corporate information</div>
                    </div>
                    <div className="space-y-3">
                      <div>Order status</div>
                      <div>Shipping and delivery</div>
                      <div>Returns</div>
                      <div>Payment options</div>
                    </div>
                  </div>
                </div>
                <div>
                  <div className="text-sm font-bold uppercase tracking-[0.2em] mb-5" style={{ color: '#ffffff' }}>Atualizacoes</div>
                  <div className="text-sm mb-4" style={{ color: 'rgba(255,255,255,0.72)' }}>Recebe novidades de lojas, promocoes e melhores oportunidades de padel.</div>
                  <div className="flex rounded-full overflow-hidden" style={{ border: '1px solid rgba(255,255,255,0.10)', backgroundColor: 'rgba(255,255,255,0.02)' }}>
                    <input placeholder="Please, enter your email address" className="flex-1 px-4 py-3 text-sm focus:outline-none" style={{ backgroundColor: 'transparent', color: '#f4f7fb' }} />
                    <button className="px-4 py-3 text-sm font-bold" style={{ backgroundColor: '#173b5c', color: '#fff' }}>OK</button>
                  </div>
                </div>
                <div>
                  <div className="text-sm font-bold uppercase tracking-[0.2em] mb-5" style={{ color: '#ffffff' }}>Redes sociais</div>
                  <div className="flex items-center gap-3 text-sm" style={{ color: 'rgba(255,255,255,0.78)' }}>
                    <a href="#" className="inline-flex items-center gap-2 px-4 py-2 rounded-full" style={{ border: '1px solid rgba(255,255,255,0.10)', backgroundColor: 'rgba(255,255,255,0.02)' }}>Facebook</a>
                    <a href="#" className="inline-flex items-center gap-2 px-4 py-2 rounded-full" style={{ border: '1px solid rgba(255,255,255,0.10)', backgroundColor: 'rgba(255,255,255,0.02)' }}>Instagram</a>
                  </div>
                </div>
              </div>

              <div className="footer-marquee mt-10 py-4">
                <div className="footer-marquee-track">
                  {Array.from({ length: 2 }).map((_, idx) => (
                    <div key={idx} className="inline-flex">
                      {['RAQUETES', 'BOLAS', 'SACOS', 'OVERGRIPS', 'SAPATILHAS', 'MELHORES PRECOS', 'LOJAS', 'OFERTAS', 'COMPARAR PRODUTOS'].map((item) => (
                        <span key={`${idx}-${item}`} className="footer-marquee-item">{item}</span>
                      ))}
                    </div>
                  ))}
                </div>
              </div>

              <div className="pt-6 text-sm flex flex-col md:flex-row md:items-center md:justify-between gap-3" style={{ color: 'rgba(255,255,255,0.50)' }}>
                <div>© PadelCost 2026. All rights reserved.</div>
                <div>Os precos podem variar. Confirma sempre na loja.</div>
              </div>
            </div>
          </div>
        </footer>
      );


      const PromoBanner = () => (
        <section className="mb-8">
          <div className="campaign-media relative">
            <div className="absolute top-4 right-4 z-[2] text-[10px] font-bold uppercase tracking-[0.22em] px-3 py-1.5 rounded-full" style={{ backgroundColor: 'rgba(8,15,24,0.46)', color: 'rgba(244,248,252,0.86)' }}>
              Espaco publicitario
            </div>
          </div>
        </section>
      );

      const HomePage = () => (
        <div className="max-w-7xl mx-auto px-4 md:px-6 pb-28">
          <PromoBanner />
          <section className="mb-10">
            <div className="flex items-center justify-between gap-4 mb-4">
              <h2 className="brand-font text-3xl font-bold">Descobrir</h2>
              <button onClick={() => openCategory('todos')} className="accent-text font-bold">Explorar tudo</button>
            </div>
            {discoverySections.map((section) => (
              <DiscoverySection key={section.title} title={section.title} products={section.products} />
            ))}
          </section>
        </div>
      );

      return (
        <div className="min-h-screen" style={{ backgroundColor: 'transparent' }} onClick={() => showAutocomplete && setShowAutocomplete(false)}>
          <Header />
          {page === 'home' && <HomePage />}
          {page === 'category' && <CategoryPage />}
          {page === 'product' && selectedProduct && <ProductPage product={selectedProduct} />}
          {page === 'compare' && <ComparePage />}
          <Footer />
          <ComparisonBar />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
